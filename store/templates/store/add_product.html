{% extends 'store/base.html' %}

{% block content %}
<div style="max-width: 700px; margin: 50px auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1);">
    <h2 style="text-align:center; color: #2c3e50; margin-bottom: 30px; font-size: 28px;">
        <i class="fas fa-plus-circle"></i> Add Product
    </h2>
    
    {% if messages %}
        {% for message in messages %}
            <div style="padding: 15px; border-radius: 8px; margin-bottom: 20px; background: {% if message.tags == 'error' %}#f8d7da{% else %}#d4edda{% endif %}; color: {% if message.tags == 'error' %}#721c24{% else %}#155724{% endif %};">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <!-- Link (Optional) -->
        <div style="margin-bottom: 20px;">
            <label style="font-weight: bold; color: #2c3e50; display: block; margin-bottom: 8px;">
                <i class="fas fa-link"></i> Product Link: <span style="color: #999;">(Optional)</span>
            </label>
            <input type="url" id="linkInput" name="link" 
                   style="width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px;" 
                   placeholder="https://example.com/product">
            <small style="color: #666;">Leave empty for manual entry</small>
        </div>
        
        <!-- Auto-Fetch Button -->
        <div style="margin-bottom: 25px;">
            <button type="button" onclick="fetchDetails()" 
                    style="width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold;">
                <i class="fas fa-magic"></i> Auto-Fetch Details
            </button>
        </div>
        
        <!-- Title (Required) -->
        <div style="margin-bottom: 20px;">
            <label style="font-weight: bold; color: #2c3e50; display: block; margin-bottom: 8px;">
                <i class="fas fa-heading"></i> Product Title: <span style="color: #e74c3c;">*</span>
            </label>
            <input type="text" id="titleInput" name="title" required 
                   style="width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px;" 
                   placeholder="Enter product title">
        </div>
        
        <!-- Price (Optional) -->
        <div style="margin-bottom: 20px;">
            <label style="font-weight: bold; color: #2c3e50; display: block; margin-bottom: 8px;">
                <i class="fas fa-tag"></i> Price (PKR): <span style="color: #999;">(Optional)</span>
            </label>
            <input type="number" id="priceInput" name="price" step="0.01" min="0" value="0.00"
                   style="width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px;" 
                   placeholder="0.00">
        </div>
        
        <!-- Image -->
        <div style="margin-bottom: 20px; padding: 20px; background: rgba(102, 126, 234, 0.1); border-radius: 8px; border: 2px dashed #667eea;">
            <label style="font-weight: bold; color: #2c3e50; display: block; margin-bottom: 15px;">
                <i class="fas fa-image"></i> Product Image: <span style="color: #999;">(Optional)</span>
            </label>
            
            <div style="margin-bottom: 15px;">
                <label style="font-size: 13px; color: #666; display: block; margin-bottom: 5px;">Option 1: Image URL</label>
                <input type="url" id="imageInput" name="image_url" 
                       style="width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px;" 
                       placeholder="https://example.com/image.jpg">
            </div>
            
            <div>
                <label style="font-size: 13px; color: #666; display: block; margin-bottom: 5px;">Option 2: Upload</label>
                <input type="file" name="image_upload" accept="image/*"
                       style="width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px;"
                       onchange="previewImage(this)">
                <div id="imagePreview" style="margin-top: 10px; text-align: center;"></div>
            </div>
        </div>
        
        <!-- Description (Required) -->
        <div style="margin-bottom: 20px;">
            <label style="font-weight: bold; color: #2c3e50; display: block; margin-bottom: 8px;">
                <i class="fas fa-align-left"></i> Description: <span style="color: #e74c3c;">*</span>
            </label>
            <textarea id="descInput" name="description" rows="5" required
                      style="width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; resize: vertical;" 
                      placeholder="Enter product description"></textarea>
        </div>
        
        <!-- Email (Optional) -->
        <div style="margin-bottom: 25px;">
            <label style="font-weight: bold; color: #2c3e50; display: block; margin-bottom: 8px;">
                <i class="fas fa-envelope"></i> Your Email: <span style="color: #999;">(Optional)</span>
            </label>
            <input type="email" name="email" 
                   style="width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px;" 
                   placeholder="your@email.com">
            <small style="color: #666;">Leave empty if you don't want to share</small>
        </div>
        
        <!-- Submit -->
        <button type="submit" 
                style="width: 100%; padding: 15px; background: linear-gradient(135deg, #28a745 0%, #20c997 100%); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold;">
            <i class="fas fa-save"></i> Save Product
        </button>
    </form>
</div>

<script>
async function fetchDetails() {
    const link = document.getElementById('linkInput').value.trim();
    if (!link) {
        alert('Please enter a product link first!');
        return;
    }
    
    const btn = event.target;
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Fetching...';
    btn.disabled = true;
    
    try {
        const response = await fetch('/fetch-details/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({ url: link })
        });
        
        const data = await response.json();
        
        if (data.success) {
            document.getElementById('titleInput').value = data.title || '';
            document.getElementById('imageInput').value = data.image_url || '';
            document.getElementById('descInput').value = data.description || '';
            document.getElementById('priceInput').value = data.price || '0.00';
            alert('Details fetched! You can edit them now.');
        } else {
            alert('Failed to fetch. Enter manually.');
        }
    } catch (error) {
        alert('Error fetching details.');
    } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
}

function previewImage(input) {
    const preview = document.getElementById('imagePreview');
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.innerHTML = `<img src="${e.target.result}" style="max-width: 200px; max-height: 200px; border-radius: 8px; margin-top: 10px;">`;
        }
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
{% endblock %}
