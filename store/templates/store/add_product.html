{% extends 'store/base.html' %}

{% block content %}
    <div style="max-width: 700px; margin: 50px auto; background: var(--card-bg); padding: 40px; border-radius: 12px; box-shadow: 0 5px 20px var(--card-shadow);">
        <h2 style="text-align:center; color: var(--text-primary); margin-bottom: 30px; font-size: 28px;">
            <i class="fas fa-plus-circle"></i> Add Product
        </h2>
        
        <form method="POST" enctype="multipart/form-data" id="productForm">
            {% csrf_token %}
            
            <!-- Product Link -->
            <div style="margin-bottom: 20px;">
                <label style="font-weight: bold; color: var(--text-primary); display: block; margin-bottom: 8px;">
                    <i class="fas fa-link"></i> Product Link:
                </label>
                <input type="url" id="linkInput" name="link" required 
                       style="width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 14px; background: var(--bg-secondary); color: var(--text-primary);" 
                       placeholder="https://example.com/product">
            </div>
            
            <!-- Auto-Fetch Button -->
            <div style="margin-bottom: 25px;">
                <button type="button" onclick="fetchDetails()" 
                        style="width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: all 0.3s;"
                        onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 5px 15px rgba(102, 126, 234, 0.4)';"
                        onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none';">
                    <i class="fas fa-magic"></i> Auto-Fetch Details
                </button>
                <small style="color: var(--text-secondary); display: block; margin-top: 8px; text-align: center;">
                    Click to automatically fetch title, image, description & price
                </small>
            </div>
            
            <!-- Product Title -->
            <div style="margin-bottom: 20px;">
                <label style="font-weight: bold; color: var(--text-primary); display: block; margin-bottom: 8px;">
                    <i class="fas fa-heading"></i> Product Title: *
                </label>
                <input type="text" id="titleInput" name="title" required 
                       style="width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 14px; background: var(--bg-secondary); color: var(--text-primary);" 
                       placeholder="Enter product title">
            </div>
            
            <!-- Price Field -->
            <div style="margin-bottom: 20px;">
                <label style="font-weight: bold; color: var(--text-primary); display: block; margin-bottom: 8px;">
                    <i class="fas fa-tag"></i> Price (PKR): *
                </label>
                <input type="number" id="priceInput" name="price" step="0.01" min="0" value="0.00" required
                       style="width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 14px; background: var(--bg-secondary); color: var(--text-primary);" 
                       placeholder="0.00">
            </div>
            
            <!-- Image Upload Options -->
            <div style="margin-bottom: 20px; padding: 20px; background: rgba(102, 126, 234, 0.1); border-radius: 8px; border: 2px dashed #667eea;">
                <label style="font-weight: bold; color: var(--text-primary); display: block; margin-bottom: 15px;">
                    <i class="fas fa-image"></i> Product Image:
                </label>
                
                <!-- Option 1: Image URL -->
                <div style="margin-bottom: 15px;">
                    <label style="font-size: 13px; color: var(--text-secondary); display: block; margin-bottom: 5px;">
                        Option 1: Image URL
                    </label>
                    <input type="url" id="imageInput" name="image_url" 
                           style="width: 100%; padding: 10px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 14px; background: var(--bg-secondary); color: var(--text-primary);" 
                           placeholder="https://example.com/image.jpg">
                </div>
                
                <!-- Option 2: Upload Image -->
                <div>
                    <label style="font-size: 13px; color: var(--text-secondary); display: block; margin-bottom: 5px;">
                        Option 2: Upload from Device
                    </label>
                    <input type="file" name="image_upload" accept="image/*"
                           style="width: 100%; padding: 10px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 14px; background: var(--bg-secondary); color: var(--text-primary);"
                           onchange="previewImage(this)">
                    <div id="imagePreview" style="margin-top: 10px; text-align: center;"></div>
                </div>
            </div>
            
            <!-- Description -->
            <div style="margin-bottom: 20px;">
                <label style="font-weight: bold; color: var(--text-primary); display: block; margin-bottom: 8px;">
                    <i class="fas fa-align-left"></i> Description: *
                </label>
                <textarea id="descInput" name="description" rows="5" required
                            style="width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 14px; background: var(--bg-secondary); color: var(--text-primary); resize: vertical;" 
                            placeholder="Enter product description manually or auto-fetch"></textarea>
                <small style="color: var(--text-secondary); display: block; margin-top: 5px;">
                    You can edit this or leave it blank to auto-fetch
                </small>
            </div>
            
            <!-- Email -->
            <div style="margin-bottom: 25px;">
                <label style="font-weight: bold; color: var(--text-primary); display: block; margin-bottom: 8px;">
                    <i class="fas fa-envelope"></i> Your Email: *
                </label>
                <input type="email" name="email" required 
                       style="width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 14px; background: var(--bg-secondary); color: var(--text-primary);" 
                       placeholder="your@email.com">
            </div>
            
            <!-- Submit Button -->
            <button type="submit" 
                    style="width: 100%; padding: 15px; background: linear-gradient(135deg, #28a745 0%, #20c997 100%); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; transition: all 0.3s;"
                    onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 5px 15px rgba(40, 167, 69, 0.4)';"
                    onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none';">
                <i class="fas fa-save"></i> Save Product
            </button>
        </form>
    </div>

    <script>
        async function fetchDetails() {
            const link = document.getElementById('linkInput').value;
            if (!link) {
                alert('Please enter a product link first!');
                return;
            }
            
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Fetching...';
            btn.disabled = true;
            
            try {
                const response = await fetch('/fetch-details/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify({ url: link })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('titleInput').value = data.title || '';
                    document.getElementById('imageInput').value = data.image_url || '';
                    document.getElementById('descInput').value = data.description || '';
                    document.getElementById('priceInput').value = data.price || '0.00';
                    alert('Details fetched successfully! You can edit them now.');
                } else {
                    alert('Failed to fetch details. Please enter manually.');
                }
            } catch (error) {
                alert('Error fetching details. Please enter manually.');
                console.error(error);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
        
        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" style="max-width: 200px; max-height: 200px; border-radius: 8px; margin-top: 10px;">`;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
{% endblock %}
